import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAeOAKLHkk3La2XKBQOseUzdWGHAFbt-8I",
  authDomain: "revsharepro.firebaseapp.com",
  databaseURL: "https://revsharepro-default-rtdb.firebaseio.com",
  projectId: "revsharepro",
  storageBucket: "revsharepro.firebasestorage.app",
  messagingSenderId: "784548003945",
  appId: "1:784548003945:web:7e5d7ae2277e2f8aad62f8",
  measurementId: "G-X5VG810RS8"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Initialize Lucide icons if the library is loaded on the page
if (window.lucide && typeof window.lucide.createIcons === 'function') {
  window.lucide.createIcons();
}

// Wait for the DOM structure to finish loading
document.addEventListener("DOMContentLoaded", () => {
  const loginForm = document.querySelector('[data-id="loginForm"]');
  const msgDisplay = document.getElementById('msg');

  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Reset feedback visibility and state
      if (msgDisplay) {
        msgDisplay.textContent = "";
        msgDisplay.style.color = "red";
        msgDisplay.className = "text-center mb-3 text-sm font-semibold";
      }

      // Collect data directly out of form input names
      const formData = new FormData(loginForm);
      const email = formData.get('email');
      const password = formData.get('password');

      // Basic client validation check
      if (!email || !password) {
        if (msgDisplay) msgDisplay.textContent = "Please fill in all fields.";
        return;
      }

      // Safeguard submission UI tracking states
      const submitBtn = loginForm.querySelector('button[type="submit"]');
      if (submitBtn) submitBtn.disabled = true;

      if (msgDisplay) {
        msgDisplay.style.color = "#38bdf8"; // Tailored cyan coloring matching your scheme
        msgDisplay.textContent = "Verifying credentials, please wait...";
      }

      try {
        // Authenticate with Firebase Auth
        await signInWithEmailAndPassword(auth, email, password);

        // Success State Feedback
        if (msgDisplay) {
          msgDisplay.style.color = "#4ade80"; // Bright emerald green matching your live indicators
          msgDisplay.textContent = "Access granted! Redirecting to dashboard...";
        }

        // Navigate safely to your requested destination layout file
        setTimeout(() => {
          window.location.href = "Account Dashboard.html";
        }, 1500);

      } catch (error) {
        console.error("Login failure event logged:", error.code, error.message);
        
        // Restore user access interactively on rejection
        if (submitBtn) submitBtn.disabled = false;

        if (msgDisplay) {
          msgDisplay.style.color = "#ef4444"; // Red alarm color
          
          // Present precise human-readable exceptions matching Firebase failure protocols
          switch (error.code) {
            case 'auth/invalid-email':
              msgDisplay.textContent = "Invalid email format. Please review your email pattern.";
              break;
            case 'auth/invalid-credential':
            case 'auth/user-not-found':
            case 'auth/wrong-password':
              msgDisplay.textContent = "Incorrect /email or password.";
              break;
            case 'auth/user-disabled':
              msgDisplay.textContent = "This account access has been suspended.";
              break;
            case 'auth/too-many-requests':
              msgDisplay.textContent = "Too many login attempts. Access temporarily locked.";
              break;
            default:
              msgDisplay.textContent = "Authentication failed: " + error.message;
              break;
          }
        }
      }
    });
  }
});

    </script>
